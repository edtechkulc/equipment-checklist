<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบยืมอุปกรณ์ (Professional Flow)</title>
<style>
body{font-family:sans-serif;background:#f5f6fa;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.badge{padding:4px 10px;border-radius:20px;font-size:12px}
.ok{background:#d4edda;color:#155724}
.busy{background:#f8d7da;color:#721c24}
.pending{background:#fff3cd;color:#856404}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer}
.primary{background:#007bff;color:#fff}
.success{background:#28a745;color:#fff}
.danger{background:#dc3545;color:#fff}
</style>
</head>
<body>

<div class="card">
<h2>📋 ส่งคำขอยืมอุปกรณ์</h2>
<input placeholder="ชื่อผู้ยืม"><br><br>
<input placeholder="ชื่องาน"><br><br>

<div>
<label><input type="checkbox"> กล้อง Canon XF705 <span class="badge ok">พร้อมใช้</span></label><br>
<label><input type="checkbox" disabled> กล้อง Canon C70 <span class="badge busy">ไม่พร้อมใช้</span></label>
</div>

<br>
<button class="primary">📤 ส่งคำขอยืม</button>
</div>

<div class="card">
<h2>🛠 ตรวจสอบคำขอ (เจ้าหน้าที่)</h2>
<p><strong>ผู้ยืม:</strong> สมชาย</p>
<p><strong>งาน:</strong> ถ่ายวิดีโอ</p>

<ul>
<li>Canon XF705 <span class="badge ok">พร้อมใช้</span></li>
<li>Canon C70 <span class="badge busy">ไม่พร้อมใช้</span></li>
</ul>

<button class="success">✅ อนุมัติ</button>
<button class="danger">❌ ไม่อนุมัติ</button>
</div>

</body>
</html>
